# pytest configuration file

[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    unit: Unit tests (no AWS calls)
    integration: Integration tests (with LocalStack)
    slow: Slow tests (takes > 10s)
    s3: S3-specific tests
    lambda: Lambda-specific tests
    requires_aws: Tests that require real AWS access

testdata_dir = tests/data
